name: Release HAL - Hashicorp Academy Labs

on:
  push:
    # Run only against version tags (e.g., v1.0.0)
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Crucial for GoReleaser to build the changelog
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # GitHub provides this automatically for the main repo release
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The Fine-Grained PAT you created to update the homebrew-tap repo
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}