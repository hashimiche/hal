name: Release HAL - Hashicorp Academy Labs

on:
  push:
    # Run only against version tags (e.g., v1.0.0)
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Crucial for GoReleaser to build the changelog
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # GitHub provides this automatically for the main repo release
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The Fine-Grained PAT you created to update the homebrew-tap repo
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

  publish-mcp-image:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build linux/amd64 hal binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${{ github.ref_name }}" -o hal-linux ./main.go

      - name: Build and push hal-mcp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/hashimiche/hal-mcp:latest
            ghcr.io/hashimiche/hal-mcp:${{ github.ref_name }}