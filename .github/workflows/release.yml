name: Release HAL - Hashicorp Academy Labs

on:
  push:
    # Run only against version tags (e.g., v1.0.0)
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Crucial for GoReleaser to build the changelog
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # GitHub provides this automatically for the main repo release
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The Fine-Grained PAT you created to update the homebrew-tap repo
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

  publish-mcp-image:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            goarch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            goarch: arm64

    runs-on: ${{ matrix.runner }}
    needs: goreleaser
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare platform slug
        id: prep
        run: echo "slug=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build hal binary for ${{ matrix.platform }}
        run: CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -ldflags "-X main.version=${{ github.ref_name }}" -o hal-linux ./main.go

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/hashimiche/hal-mcp,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: mcp-digests-${{ steps.prep.outputs.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-mcp-manifest:
    runs-on: ubuntu-latest
    needs: publish-mcp-image
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: mcp-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/hashimiche/hal-mcp:latest \
            -t ghcr.io/hashimiche/hal-mcp:${{ github.ref_name }} \
            $(printf 'ghcr.io/hashimiche/hal-mcp@sha256:%s ' *)