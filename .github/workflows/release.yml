name: Release HAL 9000

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs the git history/tags to build the changelog
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x' # Keep it aligned with your current stack
          
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          # This token is automatically provided by GitHub Actions to create the Release
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This is the Personal Access Token you create to push to the second 'homebrew-tap' repo
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}