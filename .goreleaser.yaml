version: 2

project_name: hal

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./main.go

archives:
  - formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}amd64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}

release:
  github:
    owner: hashimiche
    name: hal

# 🎯 The "We'll deal with it later" block: Using 'brews' to bypass Apple Quarantine
brews:
  - repository:
      owner: hashimiche
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/hashimiche/hal"
    description: "HAL - Hashicorp Academy Labs"
    install: |
      bin.install "hal"