version: 2

project_name: hal

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./main.go

archives:
  - format: tar.gz
    # This ensures Windows uses .zip instead of .tar.gz, matching your old script
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}amd64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}

# This block automatically creates the GitHub Release and attaches the zip/tar files
release:
  github:
    owner: hashimiche 
    name: hal

# This is the magic Homebrew block!
brews:
  - repository:
      owner: hashimiche 
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/hashimiche/hal" 
    description: "HAL 9000 - Hashicorp Academy Labs"
    
    # This tells Homebrew how to install it on the user's Mac
    install: |
      bin.install "hal"