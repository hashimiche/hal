version: 2

project_name: hal

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./main.go

archives:
  # FIX 1: Plural 'formats'
  - formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}amd64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}

release:
  github:
    owner: yourusername # CHANGE THIS
    name: hal

# FIX 2: Moved from 'brews' to 'homebrew_casks'
homebrew_casks:
  - repository:
      owner: yourusername # CHANGE THIS
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/yourusername/hal" # CHANGE THIS
    description: "HAL 9000 - Local HashiCorp Infrastructure Orchestrator"
    
    # In Casks, we don't use ruby `install` blocks. 
    # We just explicitly list the binaries to symlink.
    binaries:
      - "hal"